name: "SAST - CodeQL"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

jobs:
  analyze:
    name: SAST - Github CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: python
        queries: security-extended

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:python"
  bandit: 
    name: SAST - Bandit Python native Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Bandit with SARIF support
      run: pip install bandit[sarif]

    - name: Run Bandit and generate SARIF
      run: bandit -r . -f sarif -o bandit-results.sarif || true

    - name: Upload Bandit results to GitHub Security
      if: always() && hashFiles('bandit-results.sarif') != ''
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: bandit-results.sarif
        category: bandit-sast
  dast:
    name: Dynamic Application Security Testing
    runs-on: ubuntu-latest
    needs: [analyze, bandit]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build and starting Application
      run: |
        docker compose up -d
        echo "Aguardando API iniciar..."
        sleep 15
        curl -s http://localhost:5000/createdb
        echo "Banco populado"

    - name: DAST - OWASP ZAP API Scan
      uses: zaproxy/action-api-scan@v0.10.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
        format: openapi
        target: 'openapi_specs/openapi3.yml'
        rules_file_name: '.github/zap-rules.conf'
        fail_action: false
        allow_issue_writing: false
        artifact_name: 'zap-report'

    - name: Shutdown Application
      if: always()
      run: docker compose down
