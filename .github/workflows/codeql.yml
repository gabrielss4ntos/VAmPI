name: "SAST - CodeQL"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

jobs:
  analyze:
    name: SAST - Github CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: python
        queries: security-extended

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:python"
  bandit: 
    name: SAST - Bandit Python native Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Bandit with SARIF support
      run: pip install bandit[sarif]

    - name: Run Bandit and generate SARIF
      run: bandit -r . -f sarif -o bandit-results.sarif || true

    - name: Upload Bandit results to GitHub Security
      if: always() && hashFiles('bandit-results.sarif') != ''
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: bandit-results.sarif
        category: bandit-sast
  dast:
    name: Dynamic Application Security Testing
    runs-on: ubuntu-latest
    needs: [analyze, bandit]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and starting Application
        run: |
          docker compose up -d vampi-vulnerable
          echo "Waiting for VAmPI to start..."
          sleep 10

      - name: Initialize Database
        run: |
          curl -s http://localhost:5002/createdb || true
          sleep 2

      - name: Check if API is Running
        run: |
          curl -s http://localhost:5002/ | head -c 200

      - name: DAST - Run OWASP ZAP API Scan
        run: |
          mkdir -p zap-output
          sudo chown -R 1000:1000 zap-output
          docker run --name zap --network vampi_default \
            -v $(pwd):/zap/wrk/:rw \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-api-scan.py \
            -t /zap/wrk/openapi_specs/openapi3.yml \
            -f openapi \
            -O http://vampi-vulnerable:5000 \
            -c /zap/wrk/.github/zap-rules.tsv \
            -r /zap/wrk/zap-output/zap-report.html \
            -w /zap/wrk/zap-output/zap-report.md \
            -J /zap/wrk/zap-output/zap-report.json \
            -I
        continue-on-error: true
  
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-dast-report
          path: zap-output/
  
      - name: Shutdown Application
        if: always()
        run: docker compose down
